name: Update latest videos

# 6時間ごと + 手動実行（Actionsタブの Run workflow ボタン）で起動
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# index.html を自動コミットするため書き込み権限を付与
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update index.html with latest videos
        run: python .github/scripts/update_videos.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-update latest videos"
            git push
          else
            echo "No changes to commit"
          fi
