name: Update latest videos & song menu

# 6時間ごと + 手動実行（Actionsタブの Run workflow ボタン）で起動
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# index.html / menu.html / songs.json を自動コミットするため書き込み権限を付与
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update latest videos (index.html)
        run: python .github/scripts/update_videos.py

      - name: Update song menu (menu.html, data/songs.json)
        run: python .github/scripts/update_menu.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html menu.html data/songs.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html menu.html data/songs.json
            git commit -m "Auto-update videos and song menu"
            git push
          else
            echo "No changes to commit"
          fi
