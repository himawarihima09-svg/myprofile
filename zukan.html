<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎴 キャラクター図鑑｜しんたや</title>
  <meta name="description" content="しんたや公式キャラクター6人の図鑑。しろ・くろ・はる・なつ・あき・ふゆ。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="🎴 キャラクター図鑑｜しんたや">
  <meta property="og:description" content="しんたや公式キャラクター6人を紹介🤍🖤🌸🌊🍁❄️">
  <meta property="og:locale" content="ja_JP">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== Sugar Mist パレット（A案） ===== */
    :root {
      --pink:#ffd1e3; --pink-deep:#ff8cba; --mint:#b8f2e6; --mint-deep:#6fd6c2;
      --yellow:#fff3b0; --ink:#5b4a55; --ink-soft:#8a7a84;
      --card:#fffdfb; --card-border:#fbe4ee; --soft-shadow:0 22px 50px -24px rgba(255,140,186,.45);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'M PLUS Rounded 1c','Quicksand',sans-serif;
      color:var(--ink); line-height:1.8; min-height:100vh;
      background:linear-gradient(165deg,#fff6fa 0%,#fdeef4 52%,#edfaf5 100%);
      background-attachment:fixed; display:flex; justify-content:center;
      padding:28px 16px 48px; -webkit-font-smoothing:antialiased;
    }
    .card {
      width:100%; max-width:560px; background:var(--card); border:1px solid var(--card-border);
      border-radius:30px; padding:30px 24px 28px; box-shadow:var(--soft-shadow);
      position:relative; overflow:hidden; animation:cardIn .7s cubic-bezier(.2,.7,.2,1) both;
    }
    .card::before {
      content:""; position:absolute; top:0; left:0; right:0; height:5px;
      background:linear-gradient(90deg,var(--pink-deep),var(--yellow),var(--mint-deep),var(--pink-deep));
      background-size:200% 100%; animation:barShine 6s linear infinite;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(26px) scale(.985);} to{opacity:1;transform:none;} }
    @keyframes riseIn { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;} }
    @keyframes barShine { 0%{background-position:0% 50%;} 100%{background-position:200% 50%;} }

    .back { display:inline-block; font-size:0.82rem; font-weight:700; color:var(--mint-deep); text-decoration:none; margin-bottom:14px; }
    .back:hover { text-decoration:underline; }
    h1 { font-size:1.6rem; font-weight:800; text-align:center; }
    .subtitle {
      text-align:center; font-family:'Quicksand',sans-serif; font-weight:600;
      font-size:0.82rem; color:var(--mint-deep); margin-top:2px; margin-bottom:20px;
    }

    .chars { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; }
    @media (max-width:440px){ .chars { grid-template-columns:repeat(2, 1fr); } }
    .char {
      background:#fff; border:1.5px solid var(--pink); border-radius:20px;
      padding:10px 8px 12px; text-align:center;
      animation:riseIn .55s cubic-bezier(.2,.7,.2,1) both;
      transition:transform .15s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .char:hover { transform:translateY(-3px); border-color:var(--pink-deep); box-shadow:0 12px 22px -16px rgba(255,140,186,.7); }
    .char:nth-child(1){animation-delay:.20s} .char:nth-child(2){animation-delay:.27s}
    .char:nth-child(3){animation-delay:.34s} .char:nth-child(4){animation-delay:.41s}
    .char:nth-child(5){animation-delay:.48s} .char:nth-child(6){animation-delay:.55s}
    .char img { width:100%; height:auto; display:block; border-radius:14px; background:#fff; }
    .char .name { font-size:0.92rem; font-weight:800; color:var(--ink); margin-top:8px; }

    .note {
      font-size:0.78rem; color:var(--ink-soft); text-align:center;
      background:#fff5fa; border:1.5px dashed var(--pink); border-radius:16px;
      padding:12px 14px; margin-top:22px;
    }
    footer { margin-top:26px; text-align:center; font-family:'Quicksand',sans-serif; font-size:0.78rem; color:var(--ink-soft); }
    @media (prefers-reduced-motion:reduce){ *{animation:none!important;} .char{transition:none;} }
  </style>
</head>
<body>
  <main class="card">
    <a class="back" href="index.html">← ポータルに戻る</a>
    <h1>🎴 キャラクター図鑑</h1>
    <p class="subtitle">shintaya official characters</p>

    <div class="chars">
      <div class="char"><img src="images/chars/shiro.png" width="400" height="400" alt="しろちゃん" loading="lazy"><p class="name">🤍 しろちゃん</p></div>
      <div class="char"><img src="images/chars/kuro.png" width="400" height="400" alt="くろちゃん" loading="lazy"><p class="name">🖤 くろちゃん</p></div>
      <div class="char"><img src="images/chars/haru.png" width="400" height="400" alt="はるちゃん" loading="lazy"><p class="name">🌸 はるちゃん</p></div>
      <div class="char"><img src="images/chars/natu.png" width="400" height="400" alt="なつちゃん" loading="lazy"><p class="name">🌊 なつちゃん</p></div>
      <div class="char"><img src="images/chars/aki.png" width="400" height="400" alt="あきちゃん" loading="lazy"><p class="name">🍁 あきちゃん</p></div>
      <div class="char"><img src="images/chars/fuyu.png" width="400" height="400" alt="ふゆちゃん" loading="lazy"><p class="name">❄️ ふゆちゃん</p></div>
    </div>

    <p class="note">📝 プロフィールは準備中…！ それぞれの詳しい設定は、これから少しずつ公開予定です🍰</p>

    <footer lang="en">© 2026 shintaya. Made with AI ✨</footer>
  </main>
</body>
</html>
